name: Build Windows installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to receive the Windows files (optional)
        required: false
        type: string
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: The-Last-Hour-Windows-x64
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error

      - name: Attach Windows files to an existing release
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: gh release upload $env:RELEASE_TAG release/*.exe release/*.zip --clobber --repo $env:GITHUB_REPOSITORY
